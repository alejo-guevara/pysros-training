# =============================================================
# PE2 — Partial startup configuration (MD-CLI format)
# Chassis: 7750 SR-1s  |  TiMOS-B-25.10.R1 / nokia_srsim
# =============================================================

/configure system name "pe2"
/configure system location "Rotterdam, Netherlands"
/configure system contact "noc@example.com"

# --- Chassis power (required for sr-1s to bring up hardware) ---
/configure chassis router chassis-number 1 power-shelf 1 power-shelf-type ps-a4-shelf-dc
/configure chassis router chassis-number 1 power-shelf 1 power-module 1 power-module-type ps-a-dc-6000
/configure chassis router chassis-number 1 power-shelf 1 power-module 2 power-module-type ps-a-dc-6000
/configure chassis router chassis-number 1 power-shelf 1 power-module 3 power-module-type ps-a-dc-6000
/configure chassis router chassis-number 1 power-shelf 1 power-module 4 power-module-type ps-a-dc-6000

# --- Card / MDA ---
/configure card 1 card-type xcm-1s
/configure card 1 mda 1 mda-type s36-100gb-qsfp28 level he2400g+

# --- Connector and port ---
/configure port 1/1/c1 admin-state enable
/configure port 1/1/c1 connector breakout c1-100g
/configure port 1/1/c1/1 admin-state enable
/configure port 1/1/c1/1 description "Link to PE1"
/configure port 1/1/c1/1 ethernet mode network

# --- Interfaces ---
/configure router "Base" interface "system"
/configure router "Base" interface "system" ipv4 primary address 10.0.0.2 prefix-length 32

/configure router "Base" interface "to-pe1"
/configure router "Base" interface "to-pe1" ipv4 primary address 192.168.1.2 prefix-length 30
/configure router "Base" interface "to-pe1" port 1/1/c1/1

# --- OSPF ---
/configure router "Base" ospf 0 admin-state enable
/configure router "Base" ospf 0 area 0.0.0.0 interface "system" interface-type point-to-point
/configure router "Base" ospf 0 area 0.0.0.0 interface "to-pe1" interface-type point-to-point

# --- BGP ---
/configure router "Base" autonomous-system 65001
/configure router "Base" router-id 10.0.0.2
/configure router "Base" bgp admin-state enable
/configure router "Base" bgp group "IBGP" type internal
/configure router "Base" bgp group "IBGP" local-address "10.0.0.2"
/configure router "Base" bgp neighbor "10.0.0.1" group "IBGP"
/configure router "Base" bgp neighbor "10.0.0.1" peer-as 65001

# --- Static route ---
/configure router "Base" static-routes route 10.100.2.0/24 route-type unicast next-hop "192.168.1.1" admin-state enable
